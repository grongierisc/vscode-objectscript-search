# Runs the full unit-test suite on every push and pull request.
# Tests use @vscode/test-electron, which downloads a headless VS Code instance.
# On Linux a virtual display (Xvfb) is required; macOS and Windows run natively.

name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile tests
        run: npm run compile-tests

      - name: Run tests (Linux — needs virtual display)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test

      - name: Run tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: npm test
