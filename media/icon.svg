<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="glassGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5DD4F8"/>
      <stop offset="100%" stop-color="#0090CC"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#00AAFF" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- InterSystems dark navy background -->
  <rect width="128" height="128" rx="20" fill="#002B5C"/>

  <!--
    InterSystems IS logo — original paths from
    https://github.com/intersystems-community/intersystems-servermanager/blob/master/images/InterSystems.svg
    Original viewBox 0 0 80 80; scaled ×1.6 to fill the 128×128 canvas.
  -->
  <g transform="scale(1.6)">
    <g fill="none" transform="matrix(1.1764706,0,0,1.1764706,15.338235,-9.2941177)">
      <polygon fill="#ffffff" points="25.1,75.9 25.1,66.3 16.5,62 16.5,17.4 7.9,13.2 7.9,67.3"/>
      <polygon fill="#ffffff" points="16.5,7.9 16.5,17.4 25.1,21.8 25.1,66.3 33.6,70.6 33.6,16.5"/>
    </g>
  </g>

  <!-- Magnifying glass — bottom-right badge overlaid on the logo -->
  <g filter="url(#glow)">
    <!-- Lens background: semi-transparent navy so the logo shows through faintly -->
    <circle cx="87" cy="87" r="24" fill="#002B5C" fill-opacity="0.72"/>
    <!-- Lens ring -->
    <circle cx="87" cy="87" r="24" fill="none" stroke="url(#glassGrad)" stroke-width="7"/>
    <!-- Handle -->
    <line x1="105" y1="105" x2="122" y2="122" stroke="url(#glassGrad)" stroke-width="9" stroke-linecap="round"/>
    <!-- Subtle inner glint -->
    <circle cx="79" cy="79" r="5" fill="#ffffff" fill-opacity="0.22"/>
  </g>
</svg>
